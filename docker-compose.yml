services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    env_file:
      - backend/.env
    environment:
      - DATABASE_URL=sqlite:///./brain_tumor.db
      - UPLOAD_DIR=uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
